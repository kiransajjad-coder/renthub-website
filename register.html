<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- 1. Page Title -->
    <title>Create Account | RentHubPro</title>

    <!-- 2. Premium Favicon (Executive Gold Crown) -->
    <link rel="icon" type="image/png" href="https://img.icons8.com/ios-filled/50/D4AF37/crown.png">

    <!-- 3. Google Fonts (Plus Jakarta Sans - Switching for Brand Consistency) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <!-- 4. Bootstrap & Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- 5. Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        :root { --navy: #0A192F; --gold: #D4AF37; }
        body { 
            font-family: 'Poppins', sans-serif; 
            background: var(--navy); 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 20px 0;
            margin: 0; 
        }
        .register-card { 
            background: white; 
            padding: 40px; 
            border-radius: 25px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.4); 
            width: 100%; 
            max-width: 450px; 
            border-top: 5px solid var(--gold); 
        }
        .brand-logo { 
            font-weight: 700; 
            font-size: 1.8rem; 
            color: var(--navy); 
            text-align: center; 
            margin-bottom: 10px; 
        }
        .form-control { 
            border-radius: 10px; 
            padding: 10px 12px; 
            border: 1px solid #ddd; 
        }
        .form-control:focus {
            border-color: var(--gold);
            box-shadow: 0 0 5px rgba(212, 175, 55, 0.5);
        }
        .btn-register { 
            background: var(--navy); 
            color: var(--gold); 
            width: 100%; 
            padding: 12px; 
            border-radius: 10px; 
            font-weight: 700; 
            border: none; 
            transition: 0.3s; 
            margin-top: 10px;
        }
        .btn-register:hover { 
            background: #112240; 
            color: #fff;
            transform: translateY(-2px); 
        }
    </style>
</head>
<body>

    <div class="register-card">
        <div class="brand-logo">Rent<span style="color: var(--gold);">Hub</span>Pro</div>
        <h5 class="fw-bold mb-4 text-center text-dark">Create Your Account</h5>

        <form action="../backend/routes/web.php" method="POST">
            <input type="hidden" name="action" value="register">

            <div class="mb-3">
                <label class="small fw-bold mb-1 text-dark">Full Name</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="fa fa-user text-muted"></i></span>
                    <input type="text" name="name" class="form-control border-start-0" placeholder="John Doe" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="small fw-bold mb-1 text-dark">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="fa fa-envelope text-muted"></i></span>
                    <input type="email" name="email" class="form-control border-start-0" placeholder="example@mail.com" required>
                </div>
            </div>
            
            <div class="mb-3">
                <label class="small fw-bold mb-1 text-dark">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="fa fa-lock text-muted"></i></span>
                    <input type="password" name="password" class="form-control border-start-0" placeholder="••••••••" required>
                </div>
            </div>

            <div class="form-check mb-4">
                <input type="checkbox" class="form-check-input" id="terms" required>
                <label class="form-check-label small text-muted" for="terms">
                    I agree to the <a href="#" style="color: var(--navy); text-decoration: none;">Terms & Conditions</a>
                </label>
            </div>

            <button type="submit" class="btn btn-register shadow-sm">REGISTER NOW</button>
        </form>

        <div class="text-center mt-4 small text-muted">
            Already have an account? 
            <a href="login.html" style="color: var(--gold); font-weight:600; text-decoration:none;">Sign In</a>
        </div>
    </div>

</body>
</html>
